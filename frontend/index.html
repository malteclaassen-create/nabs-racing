<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Browser-tab icon: the NABS emblem on a pink disc (reads well on both
         light and dark browser tabs). apple-touch-icon covers iOS home screens. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <!-- Fonts are self-hosted (public/fonts), no Google servers involved. -->
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <title>NABS Racing League</title>
    <meta name="description" content="NABS Racing League, a community-run sim racing championship on Assetto Corsa. Results, standings, live timing and race sign-ups." />
    <meta name="theme-color" content="#F4AFC6" />
    <!-- Link previews (Discord, WhatsApp, …). og:image must be an ABSOLUTE URL;
         if the site ever moves to another domain, update it below
         (see DEPLOYMENT.md). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NABS Racing League" />
    <meta property="og:title" content="NABS Racing League" />
    <meta property="og:description" content="Community sim racing on Assetto Corsa: results, standings, live timing and race sign-ups." />
    <meta property="og:image" content="https://nabs-racing-production.up.railway.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NABS Racing League" />
    <meta name="twitter:description" content="Community sim racing on Assetto Corsa: results, standings, live timing and race sign-ups." />
    <meta name="twitter:image" content="https://nabs-racing-production.up.railway.app/og-image.jpg" />
    <script>
      // Apply saved/system theme before paint to avoid a flash.
      (function () {
        try {
          var s = localStorage.getItem("nabs_theme");
          var dark = s ? s === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
